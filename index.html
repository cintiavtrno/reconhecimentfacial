<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A máquina não vê seu rosto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.15/dist/face-api.js"></script>
<style>
  :root{ --paper:#ece7db; --paper2:#e3ddce; --ink:#171513; --ink-soft:#4a443c; --line:#bcb3a0; --red:#b0291f; --red-deep:#7d1a12; --blue:#2c4a52; --pos:#3a5a3f; --neg:#8a3b2e; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--paper);color:var(--ink);font-family:"Spectral",Georgia,serif;}
  body{ min-height:100vh; padding:clamp(14px,3vw,40px); background-image: repeating-linear-gradient(0deg, rgba(23,21,19,.025) 0 1px, transparent 1px 4px), radial-gradient(circle at 20% 0%, rgba(176,41,31,.05), transparent 55%); }
  .wrap{max-width:1180px;margin:0 auto;}
  header{border-bottom:3px double var(--ink);padding-bottom:14px;margin-bottom:20px;}
  h1{ font-family:"Archivo",sans-serif;font-weight:900;line-height:.92; font-size:clamp(34px,7vw,72px);letter-spacing:-.02em;text-transform:uppercase;margin:8px 0 6px; }
  h1 em{font-style:normal;color:var(--red);}
  .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;margin-top:22px;}
  .panel{border:1.5px solid var(--ink);background:var(--paper2);position:relative;}
  .panel-h{ font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase; padding:7px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center; background:var(--ink);color:var(--paper); }
  .stage{position:relative;aspect-ratio:4/3;background:#0e0d0c;overflow:hidden;}
  #video,#overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  .cover{ position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:center; gap:16px;text-align:center;padding:24px;background:rgba(14,13,12,.94);color:var(--paper); }
  button{ font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase; border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);padding:11px 18px;cursor:pointer; }
  input[type=text]{ padding:8px; width:100%; margin-top:5px; font-family:"IBM Plex Mono",monospace; }
  .block{padding:14px;border-bottom:1px solid var(--line);}
  .verdict{ margin-top:6px;text-align:center;border:2px solid var(--ink);padding:16px 10px; font-family:"Archivo",sans-serif;font-weight:900;font-size:22px; }
  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>A máquina<br>não vê seu <em>rosto</em></h1>
  </header>

  <div class="grid">
    <div class="panel">
      <div class="panel-h"><span>Captura ao vivo</span></div>
      <div class="stage">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
        <div class="cover" id="startCover"><button class="primary" id="startBtn">Ativar câmera</button></div>
        <div class="cover hidden" id="loadCover"><div>Carregando modelos…</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-h"><span>Configuração</span></div>
      <div class="block">
        <label>Nome Pessoa A:</label><input type="text" id="nomeA" value="Pessoa A">
        <button id="capA" disabled>Guardar A</button>
        <label>Nome Pessoa B:</label><input type="text" id="nomeB" value="Pessoa B">
        <button id="capB" disabled>Guardar B</button>
      </div>
      <div class="block">
        <div class="verdict" id="verdict">aguardando…</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const video=$("video"), overlay=$("overlay"), octx=overlay.getContext("2d");
  const startBtn=$("startBtn"), verdict=$("verdict");
  const capA=$("capA"), capB=$("capB"), nomeA=$("nomeA"), nomeB=$("nomeB");
  
  const MODEL_URL="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.15/model";
  let running=false, modelsReady=false;
  let lastDescriptor=null, ultimoReconhecido = null;
  const refs={A:null,B:null};

  async function start(){
    try {
      // 1. Esconde o botão e mostra a tela de "Carregando modelos..."
      $("startCover").classList.add("hidden");
      $("loadCover").classList.remove("hidden");

      // 2. Carrega os modelos (isso pode levar alguns segundos)
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

      // 3. Pede permissão e liga a câmera
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;

      // 4. Só inicia o loop e esconde o carregamento quando o vídeo estiver pronto
      video.onloadedmetadata = () => {
        $("loadCover").classList.add("hidden");
        running = true;
        loop();
      };

    } catch (err) {
      console.error("Erro na câmera:", err);
      alert("Não foi possível acessar a câmera.\nMotivo: " + err.message + "\n\nLembre-se: O arquivo deve rodar em 'localhost' ou 'https'.");
      
      // Volta para o botão inicial caso dê erro
      $("startCover").classList.remove("hidden");
      $("loadCover").classList.add("hidden");
    }
  }

  async function loop(){
    while(running){
      const res = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
      if(res) {
        lastDescriptor = res.descriptor;
        capA.disabled=false; capB.disabled=false;
      }
      updateDecision();
      await new Promise(r=>setTimeout(r, 100)); // Leitura a cada 100ms
    }
  }

  function capture(which){
    if(!lastDescriptor) return;
    refs[which] = { vec: new Float32Array(lastDescriptor), nome: which === "A" ? nomeA.value : nomeB.value };
  }
  capA.onclick=()=>capture("A");
  capB.onclick=()=>capture("B");

  function dist(a,b){
    let s=0; for(let i=0;i<a.length;i++){const x=a[i]-b[i];s+=x*x;} return Math.sqrt(s);
  }

  function updateDecision(){
    if(!lastDescriptor) { verdict.textContent="Sem rosto"; return; }
    
    let best = null, bestD = Infinity, bestNome = "";
    const threshold = 0.6;

    ["A", "B"].forEach(k => {
      if(refs[k]){
        const d = dist(refs[k].vec, lastDescriptor);
        if(d < bestD && d < threshold) { bestD = d; best = k; bestNome = refs[k].nome; }
      }
    });

    if(best){
      verdict.textContent = bestNome;
      if(ultimoReconhecido !== bestNome) {
        ultimoReconhecido = bestNome;
        // Importante: certifique-se que este IP é acessível e não gera bloqueios de CORS.
        fetch(`http://192.168.100.83/reconhecido?nome=${encodeURIComponent(bestNome)}`).catch(e => console.log("Erro no fetch: ", e));
      }
    } else {
      verdict.textContent = "Desconhecido";
      ultimoReconhecido = null;
    }
  }
  startBtn.onclick=start;
})();
</script>
</body>
</html>
